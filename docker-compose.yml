services:
  postgres:
    image: postgres:15-alpine
    container_name: tif2pdf_postgres
    environment:
      POSTGRES_DB: tif2pdf_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tif2pdf_network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: tif2pdf_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - tif2pdf_network

  web:
    build: .
    container_name: tif2pdf_web
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./:/code
      - ./test_files:/app/data/mnt
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      - DB_ENGINE=django.db.backends.postgresql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=tif2pdf_db
      - CELERY_BROKER_URL=amqp://guest:guest@rabbitmq:5672//
      - CELERY_RESULT_BACKEND=rpc://
      - DATA_MOUNT_PATH=/app/data/mnt
    networks:
      - tif2pdf_network

  celery:
    build: .
    container_name: tif2pdf_celery
    command: celery -A tif2pdf worker --loglevel=info
    volumes:
      - ./:/code
      - ./test_files:/app/data/mnt
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      - DB_ENGINE=django.db.backends.postgresql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=tif2pdf_db
      - CELERY_BROKER_URL=amqp://guest:guest@rabbitmq:5672//
      - CELERY_RESULT_BACKEND=rpc://
      - DATA_MOUNT_PATH=/app/data/mnt
    networks:
      - tif2pdf_network

  celery-beat:
    build: .
    container_name: tif2pdf_celery_beat
    command: celery -A tif2pdf beat --loglevel=info
    volumes:
      - ./:/code
      - ./test_files:/app/data/mnt
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      - DB_ENGINE=django.db.backends.postgresql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=tif2pdf_db
      - CELERY_BROKER_URL=amqp://guest:guest@rabbitmq:5672//
      - CELERY_RESULT_BACKEND=rpc://
      - DATA_MOUNT_PATH=/app/data/mnt
    networks:
      - tif2pdf_network

volumes:
  db_data:
    driver: local

networks:
  tif2pdf_network:
    driver: bridge
